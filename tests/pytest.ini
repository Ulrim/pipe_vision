# AIVIS QA 하니스 (tests/* 소유) — §1.2 인수 합격기준 자동검증.
# rootdir 를 tests/ 로 고정해 tests/conftest.py(경로/sqlite env 부트스트랩)가
# 항상 먼저 로드되게 한다. 루트에서 `pytest tests/` 로 실행해도 동일 적용.
[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
