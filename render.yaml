# ===== AIVIS cloud demo — Render Blueprint (Infrastructure as Code) =====
# Owned by devops. Deploys the backend half of the cloud demo:
#   - api        : FastAPI (REST + WebSocket), Docker, /health, port 8000
#   - vision     : inspection worker (sim camera), Docker background worker
#   - mes-watchdog (optional): re-sends mes_synced=false rows so the demo
#                  shows a 100% MES linkage rate on the dashboard.
#
# The frontend (apps/hmi, apps/dashboard) is deployed to Vercel — see
# deploy/DEPLOYMENT.md. PostgreSQL is Neon (external, free tier) — its
# DATABASE_URL is entered by hand (sync:false) because Render does not
# provision Neon.
#
# Deploy: Render Dashboard -> New -> Blueprint -> point at this repo's render.yaml.
#
# NOTES / CAVEATS:
#   * Render supports WebSocket on web services, so /ws/live works for the HMI.
#   * Render FREE web services SLEEP after ~15 min idle and cold-start on the
#     next request (first /health or first page load can take ~30-60s). For a
#     reliable demo upgrade the api to a paid "starter" instance, or accept the
#     cold start. The vision worker (background) keeps the DB populated and will
#     also be subject to free-tier limits.
#   * Object storage (R2/S3) is NOT wired here. The current code only persists
#     image PATH strings (no real upload), so the demo works with placeholders.
#
# After first deploy run the DB migration: the api `preDeployCommand` runs
# `alembic upgrade head` (postgres lifespan does NOT auto-create tables).

databases: []

services:
  # ---------------- API (FastAPI) ----------------
  - type: web
    name: aivis-api
    runtime: docker
    plan: free
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Run Alembic migrations before each deploy goes live (services/api is the
    # image WORKDIR /app, so alembic.ini + alembic/ are present there).
    preDeployCommand: alembic upgrade head
    autoDeploy: true
    envVars:
      # --- Neon Postgres (entered by hand; psycopg URL form, see DEPLOYMENT.md) ---
      # postgresql+psycopg://USER:PASSWORD@HOST/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      # --- CORS: comma-separated Vercel domains (set AFTER the Vercel deploy) ---
      - key: ALLOWED_ORIGINS
        sync: false
      # --- shared secrets / demo seed (group below) ---
      - fromGroup: aivis-shared
      # --- demo seed flags so the worker's FK target (HP12) exists ---
      - key: AIVIS_SEED_ON_STARTUP
        value: "true"
      - key: AIVIS_SEED_DEMO_ITEM
        value: "true"
      - key: AIVIS_DEMO_ITEM_CODE
        value: HP12
      - key: MES_MODE
        value: table
      - key: LOG_LEVEL
        value: INFO

  # ---------------- Vision inspection worker (sim camera) ----------------
  - type: worker
    name: aivis-vision
    runtime: docker
    plan: free
    dockerfilePath: services/vision/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: AIVIS_CAMERA
        value: sim
      # Internal URL of the api service. The worker uses AIVIS_API_URL DIRECTLY as
      # an HTTP base (services/vision/worker/config.py only rstrip("/") — it does
      # NOT prepend a scheme), so the value MUST include http:// . Render's
      # fromService `property: hostport` returns a scheme-LESS "host:port", which
      # httpx cannot use as a base URL, so we build scheme + internal host literally.
      # On Render's private network a web service is reachable at http://<name>:<port>.
      - key: AIVIS_API_URL
        value: http://aivis-api:8000
      - key: AIVIS_ITEM_CODE
        value: HP12
      # Inspection cadence (ms between sim triggers).
      - key: AIVIS_WORKER_INTERVAL_MS
        value: "1500"
      # Leave AIVIS_DATASET_DIR unset -> worker auto-synthesizes frames.
      # service token + seed admin (login fallback for GET /master) from group.
      - fromGroup: aivis-shared

  # ---------------- MES watchdog (optional, demo linkage-rate) ----------------
  # Re-sends mes_synced=false rows so the dashboard shows 100% MES linkage.
  # Remove this service if you do not want the extra free-tier worker.
  - type: worker
    name: aivis-mes-watchdog
    runtime: docker
    plan: free
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    dockerCommand: python -m mes.cli watchdog
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MES_MODE
        value: table
      - key: MES_WATCHDOG_INTERVAL_S
        value: "10"
      - fromGroup: aivis-shared

# ---------------- Shared environment group (secrets) ----------------
# JWT_SECRET / AIVIS_SERVICE_TOKEN must be the SAME across api + worker.
# Generate long random values in the Render dashboard (or `generateValue`).
envVarGroups:
  - name: aivis-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # vision worker sends X-Service-Token on POST /inspection; api must match.
      - key: AIVIS_SERVICE_TOKEN
        generateValue: true
      # Seed admin (api creates it; worker uses it as GET /master login fallback).
      - key: AIVIS_SEED_ADMIN_USER
        value: admin
      - key: AIVIS_SEED_ADMIN_PASSWORD
        sync: false
